<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>JustSecret.Id</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #0a0a0a;
        --white: #f8f7f4;
        --g50: #f2f1ee;
        --g100: #e4e3e0;
        --g200: #c8c7c4;
        --g400: #888884;
        --g600: #444440;
        --border: 1.5px solid #0a0a0a;
        --blight: 1px solid #e4e3e0;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        height: 100%;
      }
      body {
        min-height: 100%;
        background: var(--white);
        color: var(--black);
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes slideDown {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(100%);
        }
      }
      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes tIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes tOut {
        to {
          opacity: 0;
          transform: translateY(4px) scale(0.96);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes shimmer {
        from {
          background-position: -200% 0;
        }
        to {
          background-position: 200% 0;
        }
      }
      @keyframes badgePop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.4);
        }
        100% {
          transform: scale(1);
        }
      }

      /* ── HEADER ── */
      header {
        border-bottom: var(--border);
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--white);
        position: sticky;
        top: 0;
        z-index: 200;
        height: 58px;
        flex-shrink: 0;
        animation: fadeIn 0.3s var(--ease);
      }
      .logo {
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.6px;
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
        transition: opacity 0.2s;
      }
      .logo:hover {
        opacity: 0.7;
      }
      .logo-sq {
        width: 22px;
        height: 22px;
        background: var(--black);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s var(--spring);
      }
      .logo:hover .logo-sq {
        transform: rotate(90deg);
      }
      .logo-sq svg {
        fill: var(--white);
        width: 11px;
        height: 11px;
      }
      .hdr-mid {
        display: flex;
        align-items: center;
      }
      .prog-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        border: var(--blight);
        padding: 5px 12px;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--g400);
        transition: border-color 0.2s;
      }
      .prog-pill:hover {
        border-color: var(--g200);
      }
      .prog-bar {
        width: 72px;
        height: 3px;
        background: var(--g100);
        border-radius: 2px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        background: var(--black);
        transition: width 0.5s var(--ease);
        width: 0%;
        border-radius: 2px;
      }
      .hdr-r {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      /* ── BUTTONS ── */
      .btn {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 16px;
        border: var(--border);
        background: transparent;
        color: var(--black);
        cursor: pointer;
        transition: all 0.18s var(--ease);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        position: relative;
        overflow: hidden;
      }
      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--black);
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.18s var(--ease);
        z-index: -1;
      }
      .btn:hover {
        color: var(--white);
      }
      .btn:hover::after {
        transform: scaleY(1);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-solid {
        background: var(--black);
        color: var(--white);
      }
      .btn-solid::after {
        background: var(--g600);
      }
      .btn-solid:hover {
        color: var(--white);
      }
      .btn-icon {
        width: 36px;
        height: 36px;
        padding: 0;
        justify-content: center;
        font-size: 15px;
      }

      /* ── TOAST ── */
      .toast-c {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 7px;
        pointer-events: none;
      }
      .toast {
        font-size: 11px;
        letter-spacing: 0.05em;
        background: var(--black);
        color: var(--white);
        padding: 11px 18px;
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 180px;
        animation:
          tIn 0.22s var(--spring),
          tOut 0.22s var(--ease) 2.5s forwards;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }
      .toast-icon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        flex-shrink: 0;
      }

      /* ── DESKTOP LAYOUT ── */
      .app-body {
        display: grid;
        grid-template-columns: 400px 1fr;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 58px);
      }

      /* ── FORM PANEL ── */
      .form-panel {
        border-right: var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: fadeIn 0.3s var(--ease) 0.1s both;
      }
      .tabs {
        display: flex;
        border-bottom: var(--border);
        flex-shrink: 0;
      }
      .tab {
        flex: 1;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 12px 4px;
        text-align: center;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--g400);
        border-right: var(--blight);
        transition: all 0.2s var(--ease);
        position: relative;
        font-weight: 500;
      }
      .tab:last-child {
        border-right: none;
      }
      .tab::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--black);
        transform: scaleX(0);
        transition: transform 0.2s var(--ease);
      }
      .tab:hover {
        color: var(--black);
        background: var(--g50);
      }
      .tab.active {
        color: var(--black);
        background: var(--g50);
      }
      .tab.active::after {
        transform: scaleX(1);
      }
      .tab-badge {
        display: none;
        position: absolute;
        top: 4px;
        right: 4px;
        background: var(--black);
        color: var(--white);
        font-size: 7px;
        min-width: 13px;
        height: 13px;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
      }
      .tab.active .tab-badge {
        display: flex;
      }

      .form-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .pane {
        display: none;
        flex-direction: column;
        gap: 20px;
      }
      .pane.active {
        display: flex;
        animation: fadeUp 0.22s var(--ease);
      }

      /* ── SECTION LABEL ── */
      .slabel {
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--g400);
        font-weight: 600;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slabel::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--g100);
      }

      /* ── FIELDS ── */
      .fg {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .fr {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        position: relative;
      }
      .field label {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--g400);
        font-weight: 600;
        transition: color 0.2s;
      }
      .field:focus-within label {
        color: var(--black);
      }
      .field input,
      .field textarea,
      .field select {
        font-family: "Inter", sans-serif;
        font-size: 13px;
        color: var(--black);
        border: none;
        border-bottom: 1.5px solid var(--g200);
        background: transparent;
        padding: 8px 0;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
        font-weight: 400;
      }
      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--black);
      }
      .field input::placeholder,
      .field textarea::placeholder {
        color: var(--g200);
      }
      .field textarea {
        resize: none;
        min-height: 52px;
        line-height: 1.6;
      }
      .field select {
        appearance: none;
        cursor: pointer;
      }

      /* FLOATING LABEL EFFECT */
      .field-line {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1.5px;
        background: var(--black);
        transition: width 0.25s var(--ease);
      }
      .field input:focus ~ .field-line,
      .field textarea:focus ~ .field-line,
      .field select:focus ~ .field-line {
        width: 100%;
      }

      /* ── CHIPS ── */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 2px;
      }
      .chip {
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
        padding: 5px 10px;
        border: 1.5px solid var(--g200);
        cursor: pointer;
        color: var(--g400);
        transition: all 0.18s var(--ease);
        background: transparent;
        position: relative;
        overflow: hidden;
      }
      .chip::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--black);
        transform: scale(0);
        border-radius: 50%;
        transition: transform 0.3s var(--ease);
        z-index: 0;
        opacity: 0;
      }
      .chip span {
        position: relative;
        z-index: 1;
      }
      .chip:hover {
        border-color: var(--black);
        color: var(--black);
      }
      .chip:active {
        transform: scale(0.95);
      }
      .chip.active {
        border-color: var(--black);
        color: var(--white);
        background: var(--black);
      }

      /* ── STATUS ── */
      .status-bar {
        display: flex;
        gap: 4px;
      }
      .sopt {
        flex: 1;
        padding: 9px 4px;
        text-align: center;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        border: 1.5px solid var(--g100);
        cursor: pointer;
        transition: all 0.18s var(--ease);
        color: var(--g400);
        background: transparent;
      }
      .sopt:hover {
        border-color: var(--g400);
        color: var(--g600);
        transform: translateY(-1px);
      }
      .sopt:active {
        transform: translateY(0);
      }
      .sopt.active {
        border-color: var(--black);
        background: var(--black);
        color: var(--white);
      }

      /* ── ITEMS ── */
      .items-hdr {
        display: grid;
        grid-template-columns: 1fr 48px 84px 26px;
        gap: 6px;
        padding-bottom: 8px;
        border-bottom: var(--border);
      }
      .items-hdr span {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--g400);
        font-weight: 600;
      }
      .items-list {
        display: flex;
        flex-direction: column;
      }
      .item-row {
        display: grid;
        grid-template-columns: 1fr 48px 84px 26px;
        gap: 6px;
        align-items: center;
        padding: 9px 0;
        border-bottom: 1px solid var(--g100);
        position: relative;
        transition:
          background 0.15s,
          transform 0.15s;
        animation: rowIn 0.2s var(--ease);
      }
      .item-row:hover {
        background: var(--g50);
        padding-left: 4px;
        padding-right: 4px;
        margin: 0 -4px;
      }
      .item-row input {
        font-family: "Inter", sans-serif;
        font-size: 12.5px;
        color: var(--black);
        border: none;
        border-bottom: 1.5px solid transparent;
        background: transparent;
        padding: 3px 0;
        outline: none;
        width: 100%;
        transition: border-color 0.18s;
        font-weight: 400;
      }
      .item-row input:focus {
        border-color: var(--g200);
      }
      .item-row input::placeholder {
        color: var(--g200);
      }
      .drag-h {
        position: absolute;
        left: -14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--g200);
        font-size: 12px;
        cursor: grab;
        opacity: 0;
        transition: opacity 0.18s;
      }
      .item-row:hover .drag-h {
        opacity: 1;
      }
      .item-row.dragging {
        opacity: 0.4;
        transform: scale(0.98);
      }
      .item-row.drag-over::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--black);
      }

      /* AUTOCOMPLETE */
      .dw {
        position: relative;
      }
      .ac {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 50;
        background: var(--white);
        border: var(--border);
        max-height: 140px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        animation: fadeUp 0.15s var(--ease);
      }
      .ac.open {
        display: block;
      }
      .aci {
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
        transition:
          background 0.15s,
          padding-left 0.15s;
        border-bottom: var(--blight);
      }
      .aci:last-child {
        border-bottom: none;
      }
      .aci:hover {
        background: var(--g50);
        padding-left: 16px;
      }
      .aci small {
        font-size: 9px;
        color: var(--g400);
        display: block;
        margin-top: 2px;
      }

      /* REMOVE BTN */
      .btn-rm {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--g200);
        font-size: 16px;
        line-height: 1;
        transition: all 0.18s var(--ease);
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border-radius: 50%;
      }
      .btn-rm:hover {
        color: var(--black);
        background: var(--g100);
        transform: rotate(90deg);
      }

      .btn-add {
        margin-top: 10px;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
        background: none;
        border: 1.5px dashed var(--g200);
        color: var(--g400);
        padding: 11px;
        width: 100%;
        cursor: pointer;
        transition: all 0.2s var(--ease);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }
      .btn-add:hover {
        border-color: var(--black);
        color: var(--black);
        border-style: solid;
        background: var(--g50);
      }
      .btn-add:active {
        transform: scale(0.98);
      }

      /* ── SUMMARY ── */
      .sum {
        margin-top: 12px;
        background: var(--black);
        color: var(--white);
        padding: 16px 18px;
        position: relative;
        overflow: hidden;
      }
      .sum::before {
        content: "";
        position: absolute;
        top: -30px;
        right: -30px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
      }
      .srow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        font-size: 11.5px;
        transition: opacity 0.2s;
      }
      .srow.tot {
        font-size: 17px;
        font-weight: 700;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        margin-top: 8px;
        padding-top: 11px;
      }
      .slbl {
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
      }
      .pi {
        width: 36px;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-family: "Inter", sans-serif;
        font-size: 10px;
        text-align: center;
        outline: none;
        padding: 2px 3px;
        transition: border-color 0.2s;
      }
      .pi:focus {
        border-color: rgba(255, 255, 255, 0.6);
      }

      /* ── BANK ── */
      .bchips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .bchip {
        font-size: 9px;
        letter-spacing: 0.06em;
        font-weight: 600;
        padding: 6px 11px;
        border: 1.5px solid var(--g200);
        cursor: pointer;
        color: var(--g400);
        transition: all 0.18s var(--ease);
        background: transparent;
        text-transform: uppercase;
      }
      .bchip:hover {
        border-color: var(--black);
        color: var(--black);
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .bchip:active {
        transform: translateY(0);
      }

      /* ── PREVIEW PANEL ── */
      .preview-panel {
        background: #d8d3cc;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: fadeIn 0.3s var(--ease) 0.15s both;
      }
      .preview-tb {
        background: var(--g50);
        border-bottom: var(--blight);
        padding: 9px 18px;
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
      }
      .preview-tb > span {
        font-size: 9px;
        color: var(--g400);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        margin-right: auto;
      }
      .zc {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .zb {
        width: 26px;
        height: 26px;
        border: var(--blight);
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.18s var(--ease);
        font-weight: 500;
      }
      .zb:hover {
        background: var(--black);
        color: var(--white);
        border-color: var(--black);
        transform: scale(1.05);
      }
      .zb:active {
        transform: scale(0.95);
      }
      .zv {
        font-size: 10px;
        color: var(--g600);
        width: 38px;
        text-align: center;
        font-weight: 600;
      }
      .prev-scroll {
        flex: 1;
        overflow-y: auto;
        display: flex;
        justify-content: center;
        padding: 32px 24px;
      }
      .inv-wrap {
        transition: transform 0.3s var(--ease);
        transform-origin: top center;
      }

      /* ── INVOICE DOC ── */
      .inv {
        width: 660px;
        background: var(--white);
        padding: 52px 56px;
        font-family: "Inter", sans-serif;
        position: relative;
        box-shadow:
          0 8px 48px rgba(0, 0, 0, 0.18),
          0 2px 8px rgba(0, 0, 0, 0.06);
        animation: fadeUp 0.35s var(--ease);
      }
      .inv-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 40px;
      }
      .inv-cn {
        font-size: 24px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.5px;
      }
      .inv-cs {
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--g400);

        font-weight: 500;

        text-transform: uppercase;

      .imv {
        font-size: 12.5px;
        font-weight: 500;

      .inv-p {

      .ipl {
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--g400);

      }
      .ipn {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;

      .inv-tbl th {
        font-size: 8px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--g400);
        padding: 0 0 9px;
        text-align: left;
        font-weight: 600;
      }
      .inv-tbl th:not(:first-child) {
        text-align: right;
      }

        border-bottom: 1px solid var(--g100);

      }
      .inv-tbl td {
        padding: 11px 0;
        font-size: 12px;
        vertical-align: top;

      .inv-tbl td:not(:first-child) {
        text-align: right;
        font-size: 11px;
      }

        font-weight: 600;
      }

      .inv-ti {
        width: 230px;

      .itr {
        display: flex;

        color: var(--g600);

        justify-content: space-between;
        align-items: center;
      }
      .gtl {
        font-size: 8px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 600;
      }
      .gtv {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .inv-notes {
        margin-top: 32px;
        padding-top: 18px;
        border-top: var(--blight);
      }
      .inl {
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--g400);
        margin-bottom: 6px;
        font-weight: 600;
      }
      .int {
        font-size: 11px;
        color: var(--g600);
        line-height: 1.7;
      }
      .inv-foot {
        margin-top: 36px;
        border-top: var(--blight);
        padding-top: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .ifl {
        font-size: 8px;
        color: var(--g400);
        letter-spacing: 0.08em;
        line-height: 1.8;
        font-weight: 500;
      }
      .wm {
        position: absolute;
        bottom: 10px;
        right: 56px;
        font-size: 7px;
        letter-spacing: 0.1em;
        color: var(--g200);
        text-transform: uppercase;
        font-weight: 500;
      }

      /* ── MOBILE OVERLAY ── */
      .mob-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 290;
        opacity: 0;
        transition: opacity 0.25s var(--ease);
      }
      .mob-overlay.visible {
        opacity: 1;
      }

      /* ── MOBILE SHEET ── */
      .mob-sheet {
        display: none;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 56px;
        z-index: 300;
        background: var(--white);
        border-top: var(--border);
        max-height: 75vh;
        overflow: hidden;
        transform: translateY(100%);
        transition: transform 0.3s var(--spring);
        border-radius: 0;
      }
      .mob-sheet.open {
        transform: translateY(0);
      }
      .mob-sheet-drag {
        width: 36px;
        height: 4px;
        background: var(--g200);
        border-radius: 2px;
        margin: 10px auto 6px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .mob-sheet-drag:hover {
        background: var(--g400);
      }
      .mob-sheet-tabs {
        display: flex;
        border-bottom: var(--border);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .mob-sheet-tabs::-webkit-scrollbar {
        display: none;
      }
      .mob-sheet-tab {
        flex-shrink: 0;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        padding: 11px 16px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--g400);
        position: relative;
        transition: color 0.2s;
        white-space: nowrap;
      }
      .mob-sheet-tab::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--black);
        transform: scaleX(0);
        transition: transform 0.2s var(--ease);
      }
      .mob-sheet-tab.active {
        color: var(--black);
      }
      .mob-sheet-tab.active::after {
        transform: scaleX(1);
      }
      .mob-sheet-body {
        overflow-y: auto;
        padding: 16px 20px 24px;
        max-height: calc(75vh - 80px);
      }
      .mob-pane {
        display: none;
        flex-direction: column;
        gap: 16px;
      }
      .mob-pane.active {
        display: flex;
        animation: fadeUp 0.2s var(--ease);
      }

      /* ── MOBILE NAV BAR ── */
      .mob-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 310;
        background: var(--white);
        border-top: var(--border);
        height: 56px;
        box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.08);
      }
      .mob-nav-inner {
        display: flex;
        height: 100%;
      }
      .mnb {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--g400);
        transition: all 0.2s var(--ease);
        border-right: var(--blight);
        padding: 0;
      }
      .mnb:last-child {
        border-right: none;
      }
      .mnb.active {
        color: var(--black);
      }
      .mnb svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s var(--spring);
      }
      .mnb:hover svg {
        transform: translateY(-2px);
      }
      .mnb.active svg {
        transform: scale(1.1);
      }
      .mnb-dot {
        width: 4px;
        height: 4px;
        background: var(--black);
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.2s;
        margin-top: -1px;
      }
      .mnb.active .mnb-dot {
        opacity: 1;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--g200);
        border-radius: 2px;
      }

      /* ── MOBILE RESPONSIVE ── */
      @media (max-width: 768px) {
        body {
          overflow-x: hidden;
        }
        header {
          padding: 0 16px;
          height: 52px;
        }
        .hdr-mid {
          display: none;
        }
        .logo {
          font-size: 16px;
        }
        .hdr-r .btn:not(.btn-solid) {
          display: none;
        }
        .btn {
          padding: 7px 13px;
          font-size: 9px;
        }
        .app-body {
          grid-template-columns: 1fr;
          height: auto;
          overflow: visible;
          display: block;
        }
        .form-panel {
          display: none;
        }
        .preview-panel {
          height: calc(100vh - 52px - 56px);
          overflow: hidden;
        }
        .preview-tb {
          padding: 8px 14px;
        }
        .prev-scroll {
          padding: 16px 10px 20px;
        }
        .inv-wrap {
          transform: none !important;
          width: 100%;
        }
        .inv {
          width: 100%;
          min-width: 0;
          padding: 24px 18px;
          box-shadow: 0 4px 24px rgba(0, 0, 0, 0.14);
        }
        .inv-top {
          flex-direction: column;
          gap: 12px;
          margin-bottom: 22px;
        }
        .inv-tb {
          text-align: left;
        }
        .inv-t {
          font-size: 30px;
          letter-spacing: -1px;
        }
        .inv-meta {
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          margin-bottom: 20px;
        }
        .inv-p {
          grid-template-columns: 1fr;
          gap: 12px;
          padding: 14px;
          margin-bottom: 24px;
        }
        .inv-tbl td,
        .inv-tbl th {
          font-size: 10px;
          padding: 8px 0;
        }
        .inv-ti {
          width: 100%;
        }
        .inv-tots {
          display: block;
        }
        .inv-foot {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
        .mob-overlay {
          display: block;
        }
        .mob-sheet {
          display: block;
        }
        .mob-nav {
          display: flex;
        }
        .toast-c {
          bottom: 68px;
          right: 12px;
        }
        .zc {
          display: none;
        }
      }
      @media (max-width: 420px) {
        .inv {
          padding: 20px 14px;
        }
        .inv-t {
          font-size: 26px;
        }
        .inv-meta {
          grid-template-columns: 1fr;
        }
        header {
          height: 48px;
        }
        .logo {
          font-size: 14px;
        }
        .preview-panel {
          height: calc(100vh - 48px - 56px);
        }
      }

      /* ── PRINT ── */
      @media print {
        header,
        .form-panel,
        .preview-tb,
        .mob-nav,
        .mob-sheet,
        .mob-overlay,
        .toast-c {
          display: none !important;
        }
        body,
        html {
          overflow: visible;
          height: auto;
        }
        .app-body {
          display: block;
        }
        .preview-panel {
          height: auto;
          overflow: visible;
          background: white;
        }
        .prev-scroll {
          padding: 0;
          overflow: visible;
          display: block;
        }
        .inv-wrap {
          transform: none !important;
        }
        .inv {
          box-shadow: none;
          width: 100%;
          padding: 36px;
        }
        .wm {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="toast-c" id="tc"></div>

    <!-- ── HEADER ── -->

      function mkKlien(pfx) {
        return (
          '<div><div class="slabel">Info Klien</div><div class="fg">' +
          mkF(
            "tN",

      // ── SYNC SINGLE FIELD ──
      function syncFld(id, pfx) {
        var src = document.getElementById(pfx + id);
        if (!src) return;
        var val = src.value;
        // sync to both prefixes
        ["d_", "m_"].forEach(function (p) {
          if (p === pfx) return;
          var el = document.getElementById(p + id);
          if (el && el !== src) el.value = val;
        });
        render();
        upProg();
      }
      function syncField(id, pfx) {
        syncFld(id, pfx);
      }

      // ── SYNC ALL FIELDS ──
      function syncAll() {
        FIDS.forEach(function (id) {
          var d = document.getElementById("d_" + id);
          var m = document.getElementById("m_" + id);
          if (d && m) {
            if (document.activeElement === m) {
              d.value = m.value;
            } else {
              m.value = d.value;
            }
          }
        });
      }

      function v(id) {
        var el = document.getElementById("d_" + id);
        return el ? (el.value || "").trim() : "";
      }
      function vb(id) {
        // get value from either prefix
        var d = document.getElementById("d_" + id);
        if (d && d.value) return d.value.trim();
        var m = document.getElementById("m_" + id);
        return m ? (m.value || "").trim() : "";
      }

          var mp = document.getElementById("mpane" + i);
          if (dp) dp.innerHTML = fn("d_");
          if (mp) mp.innerHTML = fn("m_");

      // ── ZOOM ──

          "scale(" + zp / 100 + ")";
        document.getElementById("zv").textContent = zp + "%";
      }
      function resetZ() {
        zp = 100;

      // ── TABS ──

            p.classList.toggle("active", x === i);
          });

          t.classList.toggle("active", x === i);
        });
      }

          p.classList.toggle("active", x === i);
        });
        document.querySelectorAll(".mob-sheet-tab").forEach(function (t, x) {
          t.classList.toggle("active", x === i);
        });
        // re-render items in mobile pane
        if (i === 3) renderItemsForm("m_");

      // ── SHEET ──
      function openSheet() {
        sheetOpen = true;
        var s = document.getElementById("mobSheet"),
          o = document.getElementById("overlay");

        o.style.display = "block";
        // sync values from desktop to mobile

        renderItemsForm("m_");
        setTimeout(function () {
          s.classList.add("open");
          o.classList.add("visible");

        setMobNavActive("mnForm");

          o = document.getElementById("overlay");

          s.style.display = "none";
          o.style.display = "none";

        setMobNavActive("mnPrev");

        t.innerHTML =
          '<div class="toast-icon">' + icon + "</div><span>" + msg + "</span>";
        c.appendChild(t);
        setTimeout(function () {
          t.remove();

          (baseD && baseD.value) || new Date().toISOString().split("T")[0];
        var dt = new Date(base);

        var val = dt.toISOString().split("T")[0];

          if (e) e.value = val;

      // ── BANK ──
      function fillBank(bank, rek, pfx) {
        var nm =
          (document.getElementById("d_fN") &&
            document.getElementById("d_fN").value) ||
          "Nama Anda";
        var ph =
          (document.getElementById("d_fP") &&

          "08xx-xxxx-xxxx";

      // ── PCT SYNC ──
      function syncPct() {
        var dV = document.getElementById("d_dV"),
          mV = document.getElementById("m_dV");
        var tV = document.getElementById("d_tV"),
          tM = document.getElementById("m_tV");
        if (document.activeElement === mV && dV) dV.value = mV.value;
        else if (mV && dV) mV.value = dV.value;
        if (document.activeElement === tM && tV) tV.value = tM.value;
        else if (tM && tV) tM.value = tV.value;
        render();
      }

      // ── ITEMS ──
      function addItem(desc, qty, price) {
        desc = desc || "";
        qty = qty || 1;
        price = price || 0;
        items.push({ id: itemId++, desc: desc, qty: qty, price: price });
        renderItemsForm("d_");
        renderItemsForm("m_");
        render();
        upBadge();
      }
      function addQ(d, q, p) {
        addItem(d, q, p);
        toast('"' + d + '" ditambahkan', "＋");
      }
      function removeItem(id) {
        items = items.filter(function (i) {
          return i.id !== id;
        });
        renderItemsForm("d_");
        renderItemsForm("m_");
        render();
        upBadge();
        toast("Item dihapus", "✕");
      }
      function upBadge() {
        var n = items.length;
        var badges = [
          document.getElementById("ib"),
          document.getElementById("mib"),
        ];
        badges.forEach(function (b) {
          if (!b) return;
          if (n > 0) {
            b.textContent = n;
            b.style.display = "inline-flex";
            b.style.animation = "none";
            requestAnimationFrame(function () {
              b.style.animation = "badgePop .3s var(--spring)";
            });
          } else {
            b.style.display = "none";
          }
        });
      }

      function syncItems() {
        items.forEach(function (item) {
          // try desktop first, then mobile
          ["d_", "m_"].forEach(function (p) {
            var d = document.getElementById(p + "id_" + item.id);
            var q = document.getElementById(p + "iq_" + item.id);
            var pr = document.getElementById(p + "ip_" + item.id);
            if (d && document.activeElement === d) item.desc = d.value;
            if (q && document.activeElement === q)
              item.qty = parseFloat(q.value) || 0;
            if (pr && document.activeElement === pr)
              item.price =
                parseFloat((pr.value || "").replace(/[^\d]/g, "")) || 0;
          });
        });
      }

      function renderItemsForm(pfx) {
        var c = document.getElementById(pfx + "iCon");
        if (!c) return;
        c.innerHTML = "";
        items.forEach(function (item) {
          var row = document.createElement("div");
          row.className = "item-row";
          row.draggable = true;
          row.dataset.id = item.id;
          row.innerHTML =
            '<div class="dw">' +
            '<span class="drag-h">&#8942;</span>' +
            '<input type="text" id="' +
            pfx +
            "id_" +
            item.id +
            '" placeholder="Nama item\u2026" value="' +
            esc(item.desc) +
            '"' +
            ' oninput="onItemInput(' +
            item.id +
            ",'desc',this.value)\"" +
            ' onfocus="showAC(' +
            item.id +
            ",this.value,'" +
            pfx +
            "')\"" +
            ' onblur="setTimeout(function(){hideAC(' +
            item.id +
            ",'" +
            pfx +
            "')},200)\">" +
            '<div class="ac" id="' +
            pfx +
            "ac_" +
            item.id +
            '"></div>' +
            "</div>" +
            '<input type="number" id="' +
            pfx +
            "iq_" +
            item.id +
            '" value="' +
            item.qty +
            '" min="1"' +
            ' oninput="onItemInput(' +
            item.id +
            ',\'qty\',this.value)" style="text-align:right;font-size:12px;">' +
            '<input type="text" id="' +
            pfx +
            "ip_" +
            item.id +
            '" value="' +
            (item.price || "") +
            '" placeholder="0"' +
            ' oninput="onItemInput(' +
            item.id +
            ',\'price\',this.value)" style="text-align:right;font-size:12px;">' +
            '<button class="btn-rm" onclick="removeItem(' +
            item.id +
            ')">&#x2715;</button>';
          // drag events
          row.addEventListener("dragstart", function () {
            dragSrc = item.id;
            row.classList.add("dragging");
          });
          row.addEventListener("dragend", function () {
            row.classList.remove("dragging");
            document.querySelectorAll(".item-row").forEach(function (r) {
              r.classList.remove("drag-over");
            });
          });
          row.addEventListener("dragover", function (e) {
            e.preventDefault();
            row.classList.add("drag-over");
          });
          row.addEventListener("drop", function (e) {
            e.preventDefault();
            if (dragSrc === null || dragSrc === item.id) return;
            var fi = items.findIndex(function (i) {
              return i.id === dragSrc;
            });
            var ti = items.findIndex(function (i) {
              return i.id === item.id;
            });
            var mv = items.splice(fi, 1)[0];
            items.splice(ti, 0, mv);
            renderItemsForm("d_");
            renderItemsForm("m_");
            render();
          });
          c.appendChild(row);
        });
      }

      function onItemInput(id, field, val) {
        var item = items.find(function (i) {
          return i.id === id;
        });
        if (!item) return;
        if (field === "desc") item.desc = val;
        else if (field === "qty") item.qty = parseFloat(val) || 0;
        else if (field === "price")
          item.price = parseFloat((val || "").replace(/[^\d]/g, "")) || 0;
        // sync to both panels
        ["d_", "m_"].forEach(function (p) {
          if (field === "desc") {
            var e = document.getElementById(p + "id_" + id);
            if (e && document.activeElement !== e) e.value = val;
          }
          if (field === "qty") {
            var e = document.getElementById(p + "iq_" + id);
            if (e && document.activeElement !== e) e.value = val;
          }
          if (field === "price") {
            var e = document.getElementById(p + "ip_" + id);
            if (e && document.activeElement !== e) e.value = val;
          }
        });
        render();
      }

      // ── AUTOCOMPLETE ──
      function showAC(id, val, pfx) {
        var ac = document.getElementById(pfx + "ac_" + id);
        if (!ac || !val || val.length < 1) {
          if (ac) ac.classList.remove("open");
          return;
        }
        var m = ADB.filter(function (x) {
          return x.n.toLowerCase().indexOf(val.toLowerCase()) >= 0;
        }).slice(0, 5);
        if (!m.length) {
          ac.classList.remove("open");
          return;
        }
        ac.innerHTML = m
          .map(function (x) {
            return (
              '<div class="aci" onmousedown="applyAC(' +
              id +
              ",'" +
              esc(x.n) +
              "'," +
              x.p +
              ')">' +
              x.n +
              "<small>" +
              x.h +
              " \u2014 Rp " +
              x.p.toLocaleString("id-ID") +
              "</small></div>"
            );
          })
          .join("");
        ac.classList.add("open");
      }
      function hideAC(id, pfx) {
        var ac = document.getElementById(pfx + "ac_" + id);
        if (ac) ac.classList.remove("open");
      }
      function applyAC(id, nm, pr) {
        onItemInput(id, "desc", nm);
        onItemInput(id, "price", String(pr));
        ["d_", "m_"].forEach(function (p) {
          hideAC(id, p);
        });
        render();
      }

      // ── HELPERS ──
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function fd(d) {
        if (!d) return "\u2014";
        var pt = d.split("-");
        return (
          parseInt(pt[2]) +
          " " +
          [
            "Jan",
            "Feb",
            "Mar",
            "Apr",
            "Mei",
            "Jun",
            "Jul",
            "Agu",
            "Sep",
            "Okt",
            "Nov",
            "Des",
          ][parseInt(pt[1]) - 1] +
          " " +
          pt[0]
        );
      }
      function fmt(n) {
        var cur =
          (document.getElementById("d_cur") &&
            document.getElementById("d_cur").value) ||
          "Rp";
        if (cur === "Rp")
          return cur + "\u00a0" + Math.round(n).toLocaleString("id-ID");
        return (
          cur +
          "\u00a0" +
          n.toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          })
        );
      }
      function calc() {
        var sub = items.reduce(function (s, i) {
          return s + i.qty * i.price;
        }, 0);
        var dp =
          parseFloat(
            (document.getElementById("d_dV") &&
              document.getElementById("d_dV").value) ||
              0,
          ) || 0;
        var tp =
          parseFloat(
            (document.getElementById("d_tV") &&
              document.getElementById("d_tV").value) ||
              0,
          ) || 0;
        var dis = (sub * dp) / 100,
          ad = sub - dis,
          tax = (ad * tp) / 100;
        return { sub: sub, dis: dis, dp: dp, tax: tax, tp: tp, tot: ad + tax };
      }
      function upProg() {
        var filled =
          ["fN", "tN", "iNo"].filter(function (id) {
            return v(id).length > 0;
          }).length + (items.length > 0 ? 1 : 0);
        var pct = Math.round((filled / 4) * 100);
        document.getElementById("pf").style.width = pct + "%";
        document.getElementById("pl").textContent = pct + "%";
      }

      // ── RENDER SUMMARY ──
      function renderSum() {
        var c = calc();
        ["d_", "m_"].forEach(function (p) {
          var sub = document.getElementById(p + "sSub"),
            dis = document.getElementById(p + "sDis"),
            tax = document.getElementById(p + "sTax"),
            tot = document.getElementById(p + "sTot");
          if (sub) sub.textContent = fmt(c.sub);
          if (dis) dis.textContent = "\u2212 " + fmt(c.dis);
          if (tax) tax.textContent = "+ " + fmt(c.tax);
          if (tot) tot.textContent = fmt(c.tot);
          // sync pct inputs
          var dV2 = document.getElementById(p + "dV"),
            tV2 = document.getElementById(p + "tV");
          if (dV2 && document.activeElement !== dV2) dV2.value = c.dp;
          if (tV2 && document.activeElement !== tV2) tV2.value = c.tp;
        });
        return c;
      }

      // ── MAIN RENDER ──
      function render() {
        var c = renderSum();
        upProg();
        var st = curStatus;
        var rf = v("iRf"),
          kp = v("tK"),
          web = v("fW");
        document.getElementById("iDoc").innerHTML =
          '<div class="inv-top">' +
          "<div>" +
          '<div class="inv-cn">' +
          (v("fN") || "Nama Perusahaan") +
          "</div>" +
          '<div class="inv-cs">' +
          (v("fT") || "Tagline / Jenis Usaha") +
          "</div>" +
          "</div>" +
          '<div class="inv-tb">' +
          '<div class="inv-t">INVOICE</div>' +
          '<div class="inv-n">' +
          (v("iNo") || "INV-2026-001") +
          "</div>" +
          (rf ? '<div class="inv-n">PO: ' + rf + "</div>" : "") +
          '<span class="badge ' +
          st +
          '">' +
          st +
          "</span>" +
          "</div>" +
          "</div>" +
          '<div class="inv-div"></div>' +
          '<div class="inv-meta">' +
          '<div><div class="iml">Tanggal</div><div class="imv">' +
          (fd(v("iDt")) || fd(new Date().toISOString().split("T")[0])) +
          "</div></div>" +
          '<div><div class="iml">Jatuh Tempo</div><div class="imv">' +
          (fd(v("iDu")) || "\u2014") +
          "</div></div>" +
          '<div><div class="iml">Grand Total</div><div class="imv" style="font-weight:700;">' +
          fmt(c.tot) +
          "</div></div>" +
          "</div>" +
          '<div class="inv-p">' +
          '<div><div class="ipl">Dari</div><div class="ipn">' +
          (v("fN") || "\u2014") +
          "</div>" +
          '<div class="ipd">' +
          (v("fA") ? v("fA").replace(/\n/g, "<br>") + "<br>" : "") +
          (v("fP") ? v("fP") + "<br>" : "") +
          (v("fE") ? v("fE") + "<br>" : "") +
          (web
            ? '<span style="font-size:9px;letter-spacing:0.08em;">' +
              web +
              "</span>"
            : "") +
          "</div></div>" +
          '<div><div class="ipl">Kepada</div><div class="ipn">' +
          (v("tN") || "\u2014") +
          "</div>" +
          '<div class="ipd">' +
          (kp ? "u/p: " + kp + "<br>" : "") +
          (v("tA") ? v("tA").replace(/\n/g, "<br>") + "<br>" : "") +
          (v("tP") ? v("tP") + "<br>" : "") +
          (v("tE") ? v("tE") + "<br>" : "") +
          (v("tX") ? "NPWP: " + v("tX") : "") +
          "</div></div>" +
          "</div>" +
          '<table class="inv-tbl"><thead><tr>' +
          '<th>Deskripsi</th><th style="text-align:right">Qty</th><th style="text-align:right">Harga</th><th style="text-align:right">Total</th>' +
          "</tr></thead><tbody>" +
          (items.length === 0
            ? '<tr><td colspan="4" style="color:var(--g200);font-style:italic;padding:18px 0;text-align:center;font-size:11px;">Tambahkan item di form</td></tr>'
            : items
                .map(function (i) {
                  return (
                    '<tr><td><div class="inv-in">' +
                    (esc(i.desc) ||
                      '<span style="color:var(--g200)">\u2014</span>') +
                    "</div></td>" +
                    "<td>" +
                    i.qty +
                    "</td><td>" +
                    fmt(i.price) +
                    "</td><td>" +
                    fmt(i.qty * i.price) +
                    "</td></tr>"
                  );
                })
                .join("")) +
          "</tbody></table>" +
          '<div class="inv-tots"><div class="inv-ti">' +
          '<div class="itr"><span>Subtotal</span><span>' +
          fmt(c.sub) +
          "</span></div>" +
          (c.dp > 0
            ? '<div class="itr"><span>Diskon (' +
              c.dp +
              "%)</span><span>\u2212 " +
              fmt(c.dis) +
              "</span></div>"
            : "") +
          (c.tp > 0
            ? '<div class="itr"><span>PPN (' +
              c.tp +
              "%)</span><span>+ " +
              fmt(c.tax) +
              "</span></div>"
            : "") +
          '<div class="inv-gt"><span class="gtl">Total</span><span class="gtv">' +
          fmt(c.tot) +
          "</span></div>" +
          "</div></div>" +
          (v("iNt")
            ? '<div class="inv-notes"><div class="inl">Catatan &amp; Syarat Pembayaran</div><div class="int">' +
              v("iNt").replace(/\n/g, "<br>") +
              "</div></div>"
            : "") +
          '<div class="inv-foot">' +
          '<div class="ifl">' +
          (v("fN") || "Nama Perusahaan") +
          "<br>" +
          (v("fE") || "") +
          "<br>" +
          (v("fP") || "") +
          "</div>" +
          '<div style="text-align:right">' +
          '<svg width="56" height="56" viewBox="0 0 40 40" style="opacity:.13"><rect x="2" y="2" width="16" height="16" fill="none" stroke="#000" stroke-width="2"/><rect x="5" y="5" width="10" height="10" fill="#000"/><rect x="22" y="2" width="16" height="16" fill="none" stroke="#000" stroke-width="2"/><rect x="25" y="5" width="10" height="10" fill="#000"/><rect x="2" y="22" width="16" height="16" fill="none" stroke="#000" stroke-width="2"/><rect x="5" y="25" width="10" height="10" fill="#000"/><rect x="22" y="22" width="4" height="4" fill="#000"/><rect x="28" y="22" width="4" height="4" fill="#000"/><rect x="34" y="22" width="4" height="4" fill="#000"/><rect x="22" y="28" width="4" height="4" fill="#000"/><rect x="34" y="28" width="4" height="4" fill="#000"/><rect x="28" y="34" width="4" height="4" fill="#000"/><rect x="34" y="34" width="4" height="4" fill="#000"/></svg>' +
          '<div style="font-size:7px;color:var(--g400);letter-spacing:0.1em;margin-top:3px;font-weight:500;">' +
          (v("iNo") || "INV-2026-001") +
          "</div>" +
          "</div>" +
          "</div>" +
          '<div class="wm">Generated by JustSecret.Id</div>';
      }

      async function doCopy() {
        try {
          await navigator.clipboard.writeText(
            document.getElementById("iDoc").innerText,
          );
          toast("Teks invoice disalin");
        } catch (e) {
          toast("Tidak bisa menyalin", "!");
        }
      }
      function doExport() {
        var c = calc();
        var d = {
          meta: { generated: new Date().toISOString() },
          invoice: {
            number: v("iNo"),
            date: v("iDt"),
            due: v("iDu"),
            status: curStatus,
            currency:
              (document.getElementById("d_cur") &&
                document.getElementById("d_cur").value) ||
              "Rp",
            ref: v("iRf"),
          },
          from: {
            name: v("fN"),
            tagline: v("fT"),
            address: v("fA"),
            phone: v("fP"),
            email: v("fE"),
            web: v("fW"),
          },
          to: {
            name: v("tN"),
            person: v("tK"),
            address: v("tA"),
            phone: v("tP"),
            email: v("tE"),
            npwp: v("tX"),
          },
          items: items.map(function (i) {
            return {
              desc: i.desc,
              qty: i.qty,
              price: i.price,
              total: i.qty * i.price,
            };
          }),
          totals: {
            subtotal: c.sub,
            discount: c.dis,
            tax: c.tax,
            total: c.tot,
          },
          notes: v("iNt"),
        };
        var bl = new Blob([JSON.stringify(d, null, 2)], {
          type: "application/json",
        });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(bl);
        a.download = (v("iNo") || "invoice") + ".json";
        a.click();
        toast("File JSON diunduh", "↓");
      }

      // ── SWIPE TO CLOSE ──
      (function () {
        var sy = 0;
        document.addEventListener(
          "touchstart",
          function (e) {
            var s = document.getElementById("mobSheet");
            if (s && s.classList.contains("open")) sy = e.touches[0].clientY;
          },
          { passive: true },
        );
        document.addEventListener(
          "touchend",
          function (e) {
            var s = document.getElementById("mobSheet");
            if (s && s.classList.contains("open")) {
              var dy = e.changedTouches[0].clientY - sy;
              if (dy > 60) closeSheet();
            }
          },
          { passive: true },
        );
      })();

      // ── INIT ──
      (function init() {
        initPanes();
        var today = new Date().toISOString().split("T")[0];
        var du = new Date();
        du.setDate(du.getDate() + 14);
        ["d_iDt", "m_iDt"].forEach(function (id) {
          var e = document.getElementById(id);
          if (e) e.value = today;
        });
        ["d_iDu", "m_iDu"].forEach(function (id) {
          var e = document.getElementById(id);
          if (e) e.value = du.toISOString().split("T")[0];
        });
        ["d_iNo", "m_iNo"].forEach(function (id) {
          var e = document.getElementById(id);
          if (e) e.value = "INV-" + new Date().getFullYear() + "-001";
        });
        addItem("Cetak Brosur A5 (per 100 lbr)", 2, 85000);
        addItem("Desain Grafis", 3, 150000);
        upBadge();
        render();
      })();
    </script>
  </body>
</html>
